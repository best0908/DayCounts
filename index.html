<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳本</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e5e0d8;
    --text: #1a1714;
    --muted: #9c9488;
    --income: #2d7a4f;
    --income-bg: #edf7f1;
    --expense: #c0392b;
    --expense-bg: #fdf0ef;
    --accent: #c8a96e;
    --accent-dark: #a8873e;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    background: var(--text);
    color: #f7f5f0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--accent);
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .month-nav button {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: #f7f5f0;
    width: 30px; height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s;
  }

  .month-nav button:hover { background: rgba(255,255,255,0.1); }

  #monthLabel {
    font-size: 14px;
    font-weight: 500;
    min-width: 80px;
    text-align: center;
  }

  /* SUMMARY CARDS */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    padding: 20px 20px 0;
  }

  .sum-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .sum-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .sum-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.01em;
  }

  .sum-card.income .sum-amount { color: var(--income); }
  .sum-card.expense .sum-amount { color: var(--expense); }
  .sum-card.balance .sum-amount { color: var(--text); }

  /* ADD BUTTON */
  .add-area {
    padding: 16px 20px;
  }

  .add-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .add-btn:hover { background: var(--accent-dark); }
  .add-btn:active { transform: scale(0.99); }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 540px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .close-btn {
    background: var(--surface2);
    border: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
  }

  /* Type toggle */
  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .type-btn {
    padding: 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }

  .type-btn.active-income {
    border-color: var(--income);
    background: var(--income-bg);
    color: var(--income);
  }

  .type-btn.active-expense {
    border-color: var(--expense);
    background: var(--expense-bg);
    color: var(--expense);
  }

  /* Form fields */
  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }

  .submit-btn {
    width: 100%;
    background: var(--text);
    color: #f7f5f0;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }

  .submit-btn:hover { opacity: 0.85; }

  /* TRANSACTIONS LIST */
  .list-area {
    padding: 0 20px 40px;
  }

  .date-group {
    margin-bottom: 20px;
  }

  .date-header {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0 4px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .date-sub {
    font-size: 11px;
  }

  .tx-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .tx-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .tx-card.income::before { background: var(--income); }
  .tx-card.expense::before { background: var(--expense); }

  .tx-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .tx-card.income .tx-icon { background: var(--income-bg); }
  .tx-card.expense .tx-icon { background: var(--expense-bg); }

  .tx-info { flex: 1; min-width: 0; }

  .tx-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tx-cat {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .tx-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    flex-shrink: 0;
  }

  .tx-card.income .tx-amount { color: var(--income); }
  .tx-card.expense .tx-amount { color: var(--expense); }

  .tx-del {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .tx-del:hover { color: var(--expense); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty .emoji { font-size: 44px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* Chart bar */
  .chart-area {
    padding: 0 20px 8px;
  }

  .chart-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .chart-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .cat-bars { display: flex; flex-direction: column; gap: 8px; }

  .cat-row { display: flex; align-items: center; gap: 10px; }

  .cat-name { font-size: 12px; color: var(--muted); width: 60px; flex-shrink: 0; text-align: right; }

  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--expense);
    transition: width 0.4s ease;
  }

  .cat-val { font-size: 12px; color: var(--text); font-weight: 500; width: 60px; flex-shrink: 0; }

  @media (max-width: 400px) {
    .summary { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="app-name">帳本</div>
  <div class="month-nav">
    <button id="prevMonth">‹</button>
    <div id="monthLabel"></div>
    <button id="nextMonth">›</button>
  </div>
</div>

<div class="summary">
  <div class="sum-card income">
    <div class="sum-label">收入</div>
    <div class="sum-amount" id="sumIncome">$0</div>
  </div>
  <div class="sum-card expense">
    <div class="sum-label">支出</div>
    <div class="sum-amount" id="sumExpense">$0</div>
  </div>
  <div class="sum-card balance">
    <div class="sum-label">結餘</div>
    <div class="sum-amount" id="sumBalance">$0</div>
  </div>
</div>

<div class="add-area">
  <button class="add-btn" id="openModal">＋ 新增記錄</button>
</div>

<div class="chart-area" id="chartArea"></div>

<div class="list-area" id="listArea"></div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">
      新增記錄
      <button class="close-btn" id="closeModal">✕</button>
    </div>

    <div class="type-toggle">
      <button class="type-btn active-expense" id="btnExpense" data-type="expense">💸 支出</button>
      <button class="type-btn" id="btnIncome" data-type="income">💰 收入</button>
    </div>

    <div class="field">
      <label>金額</label>
      <input type="number" id="fAmount" placeholder="0" min="0">
    </div>
    <div class="field">
      <label>說明</label>
      <input type="text" id="fNote" placeholder="例：午餐、薪水…">
    </div>
    <div class="field">
      <label>分類</label>
      <select id="fCat">
        <option value="🍜 餐飲">🍜 餐飲</option>
        <option value="🚌 交通">🚌 交通</option>
        <option value="🛍️ 購物">🛍️ 購物</option>
        <option value="🏠 居家">🏠 居家</option>
        <option value="🎬 娛樂">🎬 娛樂</option>
        <option value="🏥 醫療">🏥 醫療</option>
        <option value="📚 學習">📚 學習</option>
        <option value="💼 薪水">💼 薪水</option>
        <option value="📈 投資">📈 投資</option>
        <option value="🎁 其他">🎁 其他</option>
      </select>
    </div>
    <div class="field">
      <label>日期</label>
      <input type="date" id="fDate">
    </div>

    <button class="submit-btn" id="submitBtn">新增</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const STORE_KEY = 'ledger_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function save(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

let records = load();
let currentType = 'expense';
let viewYear, viewMonth;

// seed demo data if empty
function seedDemo() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const pad = n => String(n).padStart(2, '0');
  const demos = [
    { id: uid(), type:'expense', amount:320, note:'午餐便當', cat:'🍜 餐飲',   date:`${y}-${pad(m)}-03` },
    { id: uid(), type:'expense', amount:1200, note:'週末採購', cat:'🛍️ 購物',  date:`${y}-${pad(m)}-05` },
    { id: uid(), type:'income',  amount:52000, note:'四月薪水', cat:'💼 薪水',  date:`${y}-${pad(m)}-05` },
    { id: uid(), type:'expense', amount:180, note:'捷運月票儲值', cat:'🚌 交通', date:`${y}-${pad(m)}-06` },
    { id: uid(), type:'expense', amount:560, note:'電影票兩張', cat:'🎬 娛樂',  date:`${y}-${pad(m)}-07` },
    { id: uid(), type:'expense', amount:450, note:'診所掛號', cat:'🏥 醫療',   date:`${y}-${pad(m)}-08` },
    { id: uid(), type:'expense', amount:890, note:'晚餐聚餐', cat:'🍜 餐飲',   date:`${y}-${pad(m)}-08` },
    { id: uid(), type:'income',  amount:3000, note:'接案收入', cat:'📈 投資',   date:`${y}-${pad(m)}-09` },
    { id: uid(), type:'expense', amount:290, note:'書籍', cat:'📚 學習',        date:`${y}-${pad(m)}-09` },
  ];
  records = demos;
  save(records);
}

if (records.length === 0) seedDemo();

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── MONTH NAV ─────────────────────────────────────────
function initMonth() {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth() + 1;
}

function monthStr() {
  return `${viewYear} / ${String(viewMonth).padStart(2,'0')}`;
}

document.getElementById('prevMonth').onclick = () => {
  viewMonth--;
  if (viewMonth < 1) { viewMonth = 12; viewYear--; }
  renderAll();
};

document.getElementById('nextMonth').onclick = () => {
  viewMonth++;
  if (viewMonth > 12) { viewMonth = 1; viewYear++; }
  renderAll();
};

// ── FILTER ────────────────────────────────────────────
function filtered() {
  const prefix = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
  return records.filter(r => r.date.startsWith(prefix));
}

// ── RENDER ALL ────────────────────────────────────────
function renderAll() {
  document.getElementById('monthLabel').textContent = monthStr();
  renderSummary();
  renderChart();
  renderList();
}

function fmt(n) {
  return '$' + Number(n).toLocaleString('zh-TW');
}

function renderSummary() {
  const data = filtered();
  const income  = data.filter(r => r.type === 'income').reduce((s,r) => s + r.amount, 0);
  const expense = data.filter(r => r.type === 'expense').reduce((s,r) => s + r.amount, 0);
  document.getElementById('sumIncome').textContent  = fmt(income);
  document.getElementById('sumExpense').textContent = fmt(expense);
  const bal = income - expense;
  const balEl = document.getElementById('sumBalance');
  balEl.textContent = fmt(Math.abs(bal));
  balEl.style.color = bal >= 0 ? 'var(--income)' : 'var(--expense)';
}

function renderChart() {
  const area = document.getElementById('chartArea');
  const expenses = filtered().filter(r => r.type === 'expense');
  if (expenses.length === 0) { area.innerHTML = ''; return; }

  const catTotals = {};
  expenses.forEach(r => {
    catTotals[r.cat] = (catTotals[r.cat] || 0) + r.amount;
  });

  const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]).slice(0,5);
  const max = sorted[0][1];

  area.innerHTML = `
    <div class="chart-wrap">
      <div class="chart-title">支出分類</div>
      <div class="cat-bars">
        ${sorted.map(([cat, val]) => `
          <div class="cat-row">
            <div class="cat-name">${cat.split(' ')[0]}<br><span style="font-size:10px">${cat.split(' ')[1]||''}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/max*100)}%"></div></div>
            <div class="cat-val">${fmt(val)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderList() {
  const area = document.getElementById('listArea');
  const data = filtered().sort((a,b) => b.date.localeCompare(a.date));

  if (data.length === 0) {
    area.innerHTML = `<div class="empty"><div class="emoji">📭</div><p>這個月還沒有記錄<br>點上方按鈕新增第一筆</p></div>`;
    return;
  }

  // Group by date
  const groups = {};
  data.forEach(r => {
    if (!groups[r.date]) groups[r.date] = [];
    groups[r.date].push(r);
  });

  area.innerHTML = Object.entries(groups).map(([date, items]) => {
    const [y,m,d] = date.split('-');
    const dayNames = ['日','一','二','三','四','五','六'];
    const dow = new Date(date).getDay();
    const dayTotal = items.reduce((s,r) => r.type==='expense' ? s-r.amount : s+r.amount, 0);

    return `
      <div class="date-group">
        <div class="date-header">
          <span>${m}月${d}日 （週${dayNames[dow]}）</span>
          <span class="date-sub" style="color:${dayTotal>=0?'var(--income)':'var(--expense)'}">${dayTotal>=0?'+':''}${fmt(Math.abs(dayTotal))}</span>
        </div>
        ${items.map(r => `
          <div class="tx-card ${r.type}">
            <div class="tx-icon">${r.cat.split(' ')[0]}</div>
            <div class="tx-info">
              <div class="tx-title">${r.note || r.cat}</div>
              <div class="tx-cat">${r.cat}</div>
            </div>
            <div class="tx-amount">${r.type==='income'?'+':'−'}${fmt(r.amount)}</div>
            <button class="tx-del" data-id="${r.id}" title="刪除">✕</button>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');

  // Delete
  area.querySelectorAll('.tx-del').forEach(btn => {
    btn.onclick = () => {
      records = records.filter(r => r.id !== btn.dataset.id);
      save(records);
      renderAll();
    };
  });
}

// ── MODAL ─────────────────────────────────────────────
const overlay = document.getElementById('overlay');

document.getElementById('openModal').onclick = () => {
  // Set today's date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('fDate').value = today;
  document.getElementById('fAmount').value = '';
  document.getElementById('fNote').value = '';
  overlay.classList.add('open');
};

document.getElementById('closeModal').onclick = () => overlay.classList.remove('open');
overlay.onclick = e => { if (e.target === overlay) overlay.classList.remove('open'); };

// Type toggle
document.getElementById('btnExpense').onclick = () => setType('expense');
document.getElementById('btnIncome').onclick  = () => setType('income');

function setType(t) {
  currentType = t;
  document.getElementById('btnExpense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
  document.getElementById('btnIncome').className  = 'type-btn' + (t==='income'  ? ' active-income'  : '');

  // Update category options
  const sel = document.getElementById('fCat');
  const expenseCats = ['🍜 餐飲','🚌 交通','🛍️ 購物','🏠 居家','🎬 娛樂','🏥 醫療','📚 學習','🎁 其他'];
  const incomeCats  = ['💼 薪水','📈 投資','🎁 其他收入'];
  const cats = t === 'expense' ? expenseCats : incomeCats;
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

document.getElementById('submitBtn').onclick = () => {
  const amount = parseFloat(document.getElementById('fAmount').value);
  const note   = document.getElementById('fNote').value.trim();
  const cat    = document.getElementById('fCat').value;
  const date   = document.getElementById('fDate').value;

  if (!amount || amount <= 0) { alert('請輸入金額'); return; }
  if (!date) { alert('請選擇日期'); return; }

  records.push({ id: uid(), type: currentType, amount, note: note || cat, cat, date });
  save(records);
  overlay.classList.remove('open');
  renderAll();
};

// ── INIT ──────────────────────────────────────────────
initMonth();
renderAll();
</script>
</body>
</html>
